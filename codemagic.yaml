workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 120
    instance_type: mac_mini_m2
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '*'
          include: true
          source: true
    environment:
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build web app
        script: |
          npm run build
      - name: Sync Capacitor
        script: |
          npx cap sync ios
      - name: Configure iOS Extensions
        script: |
          gem install xcodeproj
          ruby setup-widget.rb
      - name: Build iOS App
        script: |
          # Create an archive of the app
          xcodebuild archive \
            -project "ios/App/App.xcodeproj" \
            -scheme "App" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "build/ios/App.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      - name: Package IPA
        script: |
          # Create IPA from the archive content
          mkdir -p build/ios/ipa/Payload
          cp -r "build/ios/App.xcarchive/Products/Applications/App.app" "build/ios/ipa/Payload/"
          cd build/ios/ipa
          # Verify content before zipping
          ls -R Payload
          zip -r App.ipa Payload
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
